<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="container">
        <div class="location-input-field">
            <div>
                <label for="location-input" class="location-label">Enter Location:</label>
                <div>
                    <select class="unit-selector">
                        <option value="Celsius">°C</option>
                        <option value="Fahrenheit">°F</option>
                    </select>
                    <input type="text" name="location" class="location-input">
                    <button class="get-weather-btn">Get Weather</button>
                </div>
            </div>
            <div class="weather-info display-none">
                <!-- Weather information will be displayed here -->
            </div>
        </div>
    </section>
</body>

</html>
